# Build the Vite/TanStack SPA and deploy it to GitHub Pages.
# Based on GitHub's "Static HTML" starter workflow, with a build step added.
name: Deploy to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the
# in-progress and latest queued. Do NOT cancel in-progress runs, so production
# deployments can complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies
        run: deno install --frozen

      - name: Build (GitHub Pages, SPA)
        run: deno task build:pages

      - name: Add SPA fallback
        # GitHub Pages serves 404.html for unknown paths; for an SPA we serve
        # index.html so client-side routing handles deep links and refreshes.
        # (No .nojekyll needed: the Actions deploy method never runs Jekyll.)
        run: cp .output/public/index.html .output/public/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: .output/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
